rules:
  - id: hardcoded-google-api-key
    patterns:
      - pattern-regex: 'AIzaSy[A-Za-z0-9_\-]+'
    message: >
      SECURITY: Hardcoded Google API key detected (matched prefix 'AIzaSy...').
      API keys must never be committed to source control.
      Use environment variables or GCP Secret Manager instead:
        - os.environ["GOOGLE_API_KEY"]
        - google.cloud.secretmanager
    languages:
      - python
    severity: ERROR
    metadata:
      category: security
      subcategory:
        - vuln
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      owasp:
        - "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      references:
        - https://cloud.google.com/docs/authentication/api-keys
        - https://owasp.org/www-project-top-ten/
